<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Cajero Automático</title>
</head>
<body>
    <header class="bg-bbva p-3 mb-4 shadow">
        <h1 class="h3 text-center">Cajero Automático</h1>
    </header>

    <main class="container">
        <section id="login-section" class="card mx-auto shadow-sm" style="max-width: 400px;">
            <div class="card-body">
                <h2 class="h5 card-title text-center mb-4">Bienvenido, identifíquese</h2>
                
                <div class="mb-3">
                    <label for="select-user" class="form-label">Seleccione su cuenta</label>
                    <select id="select-user" class="form-select">
                        <option value="" selected disabled>Escoja un usuario</option>
                        <option value="44788834">Mali</option>
                        <option value="10247439">Gera</option>
                        <option value="98005362">Sabi</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña </label>
                    <input type="password" id="password" class="form-control" placeholder="Ingrese PIN">
                </div>

                <button onclick="validarLogin()" class="btn btn-primary w-100 bg-bbva border-0">Ingresar</button>
            </div>
        </section>
        
        <section id="menu-section" class="card mx-auto shadow-sm d-none" style="max-width: 500px;">
            <div class="card-body text-center">
                <h2 class="h4 mb-4">Bienvenido/a, <span id="user-name-display" class="text-primary"></span></h2>
        
                <div class="d-grid gap-3">
                    <button onclick="mostrarSaldo()" class="btn btn-outline-primary text-start p-3">
                        1. Consultar saldo
                    </button>
                    <button onclick="prepararDeposito()" class="btn btn-outline-primary text-start p-3">
                        2. Ingresar monto
                    </button>
                    <button onclick="prepararRetiro()" class="btn btn-outline-primary text-start p-3">
                        3. Retirar monto
                    </button>
                    <button onclick="logout()" class="btn btn-danger mt-3">Salir</button>
                </div>

                <div id="display-screen" class="mt-4 p-3 bg-light border rounded shadow-inner" style="min-height: 80px;">
                    <p class="text-muted m-0">Seleccione una operación</p>
                </div>
            </div>
        </section>
        </main>
        <div class="modal fade" id="atmModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div id="modal-header-color" class="modal-header bg-bbva text-white">
                        <h5 class="modal-title" id="modalTitle">Notificación</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body text-center p-4">
                        <p id="modalMessage" class="fs-5"></p>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-primary bg-bbva px-4" data-bs-dismiss="modal">Entendido</button>
                    </div>
                </div>
            </div>
        </div>
    <script src="main.js"></script>
</body>
</html>
